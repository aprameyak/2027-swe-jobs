name: Approve Tech Job Issues

on:
  workflow_dispatch

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Approve in-scope tech job issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Issues to approve (in-scope tech roles in US/Canada)
          ISSUES="525 524 523 522 521 520 519 518 517 516 515 514 513 512 509 508 507 506 505 502 501 500 499 492 491 489 488 487 486 478 477 476 475 474 473 464 463 462 461 460 459 458 457 456 455 454 453 452 451 450 449 448 447 439 409 408 407"
          
          for ISSUE_NUM in $ISSUES; do
            gh issue edit $ISSUE_NUM --repo aprameyak/2027-tech-jobs --add-label "approved" 2>&1
            echo "✅ Issue #$ISSUE_NUM approved"
          done
          
          echo ""
          echo "===================="
          echo "APPROVAL COMPLETE"
          echo "===================="
          echo "Total issues approved: $(echo $ISSUES | wc -w)"
